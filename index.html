<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Secadores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f2f5;
      --card-bg:   #ffffff;
      --line:      #222;
      --fill:      #f2bf00;
      --text:      #1a1a1a;
      --muted:     #666;
      --btn:       #1a1a1a;
      --btn-hover: #333;
      --radius:    14px;
      --shadow:    0 2px 12px rgba(0,0,0,0.10);
      --green:     #16a34a;
      --red:       #dc2626;
    }

    body {
      background: var(--bg);
      font-family: "Poppins", sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .screen {
      width: 100%;
      max-width: 440px;
      padding: 0 12px 28px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 0 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .dryer-select {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
      cursor: pointer;
      padding: 4px 28px 4px 8px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text) 50%),
        linear-gradient(135deg, var(--text) 50%, transparent 50%);
      background-position:
        calc(100% - 14px) calc(50% - 2px),
        calc(100% - 8px)  calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .action-btn {
      border: none;
      background: var(--btn);
      color: #fff;
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      min-height: 44px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.22);
      transition: background 0.18s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .action-btn:active { transform: scale(0.97); }

    .sync-status {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 50px;
      background: transparent;
      color: transparent;
      transition: background 0.3s, color 0.3s;
      min-height: 26px;
    }
    .sync-status.syncing { background: #fef3c7; color: #92400e; }
    .sync-status.ok      { background: #dcfce7; color: #166534; }
    .sync-status.error   { background: #fee2e2; color: #991b1b; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .silo-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow 0.18s;
      cursor: pointer;
    }
    .silo-card:active { box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

    .silo-visual {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .unit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      user-select: none;
    }

    .tank {
      width: 60px;
      height: 128px;
      border: 1.5px solid var(--line);
      border-radius: 3px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .segment {
      width: 100%;
      border-bottom: 1px solid var(--line);
      background: var(--fill);
      flex: 1;
    }
    .segment:last-child { border-bottom: none; }
    .segment.empty { background: #f5f5f5; }

    .values {
      width: 46px;
      height: 128px;
      position: relative;
      font-family: "Poppins", sans-serif;
      font-size: 13px;
      font-weight: 700;
    }

    .v {
      position: absolute;
      width: 100%;
      text-align: left;
      white-space: nowrap;
    }
    .v1 { top: 14px; }
    .v2 { top: 54px; }
    .v3 { top: 94px; }

    .v.green { color: var(--green); }
    .v.red   { color: var(--red); }

    .silo-name {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      letter-spacing: 0.2px;
    }

    .silo-category {
      margin-top: 3px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .silo-dr {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      color: #2563eb;
      letter-spacing: 0.3px;
    }
    .silo-dr.dr-none { color: var(--muted); font-weight: 500; }

    /* ── Modals ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.50);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      z-index: 999;
    }
    .modal-backdrop.show { display: flex; }

    .modal {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border-radius: 20px 20px 0 0;
      padding: 20px 18px 32px;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.18);
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.22s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 4px;
      margin: 0 auto 16px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 18px;
      color: var(--text);
    }

    /* section dividers inside modal */
    .field-group-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin: 14px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #eee;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      background: #fafafa;
      color: var(--text);
      transition: border-color 0.15s;
      outline: none;
    }
    .field input:focus,
    .field select:focus { border-color: var(--btn); background: #fff; }

    .field input.invalid { border-color: var(--red); }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-actions button {
      flex: 1;
      min-height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .modal-actions button:active { transform: scale(0.97); }

    .btn-cancel {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-save {
      background: var(--btn);
      color: #fff;
    }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Chart modal ── */
    .chart-subtitle {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .chart-wrap {
      width: 100%;
      overflow-x: auto;
      background: #fafafa;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 8px;
    }

    canvas {
      width: 100%;
      height: 240px;
      display: block;
    }

    .history-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

      </div>

        <label for="categoriaInput">Categoria</label>

          <option value="Básica">Básica</option>

      <div class="three-col">

          <input id="umidadeBaixaInput" type="number" min="0" max="40" step="0.1" placeholder="0–40" />
        </div>
      </div>

      <div class="field-group-label">Temperatura (°C)</div>

      <div class="three-col">
        <div class="field">
          <label for="tempAltaInput">Alta</label>
          <input id="tempAltaInput" type="number" step="0.1" placeholder="°C" />
        </div>
        <div class="field">
          <label for="tempMeioInput">Meio</label>
          <input id="tempMeioInput" type="number" step="0.1" placeholder="°C" />
        </div>
        <div class="field">
          <label for="tempBaixaInput">Baixa</label>
          <input id="tempBaixaInput" type="number" step="0.1" placeholder="°C" />
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn" type="button">Cancelar</button>
        <button class="btn-save"   id="saveBtn"   type="button">Salvar</button>
      </div>
    </div>
  </div>

      <div class="modal-handle"></div>
      <h2 id="chartTitle">Histórico do silo</h2>

        <button class="btn-cancel" id="toggleChartBtn" type="button">Ver Temperatura</button>
        <button class="btn-cancel" id="closeChartBtn"  type="button">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    // ── Supabase ──────────────────────────────────────────────────────────────
    const SUPABASE_URL = "https://aizsokjiqqmdnvlrgusx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpenNva2ppcXFtZG52bHJndXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDE0MDIsImV4cCI6MjA5MDI3NzQwMn0.xZjitYi1DK4IoRgdzxX7NKqJ7eFpRILB5_lxAFaitOY";

        { id:3, nome:"Silo 03", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"C1",       history:[] },
        { id:4, nome:"Silo 04", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"C2",       history:[] },
        { id:5, nome:"Silo 05", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"S1",       history:[] },
        { id:6, nome:"Silo 06", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"S2",       history:[] }
      ]},
      "SECADOR 10": { silos: [
        { id:1, nome:"Silo 01", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"Genética", history:[] },
        { id:2, nome:"Silo 02", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"Básica",   history:[] },
        { id:3, nome:"Silo 03", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"C1",       history:[] },
        { id:4, nome:"Silo 04", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"C2",       history:[] },
        { id:5, nome:"Silo 05", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"S1",       history:[] },
        { id:6, nome:"Silo 06", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"S2",       history:[] }
      ]},
      "SECADOR 11": { silos: [
        { id:1, nome:"Silo 01", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"Genética", history:[] },
        { id:2, nome:"Silo 02", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"Básica",   history:[] },
        { id:3, nome:"Silo 03", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"C1",       history:[] },
        { id:4, nome:"Silo 04", nivel:0, umidadeBaixa:0, tempBaixa:0, umidadeMeio:0, tempMeio:0, umidadeAlta:0, tempAlta:0, tempChama:0, categoria:"C2",       history:[] }
      ]}
    };

    let currentDryer = "SECADOR 09";

    const dryerSelect       = document.getElementById("dryerSelect");
    const grid              = document.getElementById("siloGrid");
    const modalBackdrop     = document.getElementById("modalBackdrop");
    const openModalBtn      = document.getElementById("openModalBtn");
    const cancelBtn         = document.getElementById("cancelBtn");
    const saveBtn           = document.getElementById("saveBtn");
    const siloSelect        = document.getElementById("siloSelect");
    const operadorInput     = document.getElementById("operadorInput");
    const nivelInput        = document.getElementById("nivelInput");
    const tempChamaInput    = document.getElementById("tempChamaInput");
    const umidadeBaixaInput = document.getElementById("umidadeBaixaInput");
    const tempBaixaInput    = document.getElementById("tempBaixaInput");
    const umidadeMeioInput  = document.getElementById("umidadeMeioInput");
    const tempMeioInput     = document.getElementById("tempMeioInput");
    const umidadeAltaInput  = document.getElementById("umidadeAltaInput");
    const tempAltaInput     = document.getElementById("tempAltaInput");

    const chartBackdrop = document.getElementById("chartBackdrop");

    let chartMode = "umidade";
    let lastOpenedSiloId = null;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setSyncStatus(state, text) {
      syncStatus.className = "sync-status " + state;
      syncStatus.textContent = text;
    }

    function nowLabel() { return new Date().toISOString(); }

    function getCurrentSilos() { return dryers[currentDryer].silos; }

    function umidadeColor(value) {
      return Number(value) <= 13 ? "green" : "red";
    }

    function formatPercent(value) {
      return Number(value).toFixed(1).replace(".", ",") + "%";
    }

    function formatNumber(value) {
      return Number(value).toFixed(1).replace(".", ",");
    }

    // Drying Rate: (média umidade anterior - média umidade atual) / horas entre leituras
    // Só válido se o intervalo entre as duas últimas leituras for < 50 minutos
    function computeDR(silo) {
      const h = silo.history;
      if (h.length < 2) return null;
      const prev = h[h.length - 2];
      const curr = h[h.length - 1];
      const dtMin = (new Date(curr.timestamp) - new Date(prev.timestamp)) / 60000; // minutos
      if (dtMin <= 0 || dtMin >= 50) return null;
      const avgPrev = (Number(prev.umidadeAlta) + Number(prev.umidadeMeio) + Number(prev.umidadeBaixa)) / 3;
      const avgCurr = (Number(curr.umidadeAlta) + Number(curr.umidadeMeio) + Number(curr.umidadeBaixa)) / 3;
      const dtHoras = dtMin / 60;
      return (avgPrev - avgCurr) / dtHoras;
    }

    function formatDR(silo) {
      const dr = computeDR(silo);
      if (dr === null) return null;
      return "DR: " + dr.toFixed(2).replace(".", ",") + " pph";
    }

    // ── Selects ──────────────────────────────────────────────────────────────
    function populateDryerSelect() {
      dryerSelect.innerHTML = Object.keys(dryers)
        .map(n => `<option value="${n}">${n}</option>`).join("");
      dryerSelect.value = currentDryer;
    }

    function populateSiloSelect() {
      siloSelect.innerHTML = getCurrentSilos()
        .map(s => `<option value="${s.id}">${s.nome}</option>`).join("");
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderSilos() {
      grid.innerHTML = "";
      getCurrentSilos().forEach(silo => {
        const card   = document.createElement("div");
        card.className = "silo-card";
        card.addEventListener("click", () => openChart(silo.id));

        const visual = document.createElement("div");
        visual.className = "silo-visual";

        const unit = document.createElement("div");
        unit.className = "unit";

        const tank = document.createElement("div");
        tank.className = "tank";

        const filled = Math.max(0, Math.min(6, Math.round((silo.nivel / 100) * 6)));
        for (let i = 0; i < 6 - filled; i++) {
          const s = document.createElement("div");
          s.className = "segment empty";
          tank.appendChild(s);
        }
        for (let i = 0; i < filled; i++) {
          const s = document.createElement("div");
          s.className = "segment";
          tank.appendChild(s);
        }

        const values = document.createElement("div");
        values.className = "values";
        values.innerHTML = `
          <div class="v v1 ${umidadeColor(silo.umidadeAlta)}">${formatPercent(silo.umidadeAlta)}</div>
          <div class="v v2 ${umidadeColor(silo.umidadeMeio)}">${formatPercent(silo.umidadeMeio)}</div>
          <div class="v v3 ${umidadeColor(silo.umidadeBaixa)}">${formatPercent(silo.umidadeBaixa)}</div>
        `;

        unit.appendChild(tank);
        unit.appendChild(values);

        const name = document.createElement("div");
        name.className = "silo-name";
        name.textContent = silo.nome;

        const cat = document.createElement("div");
        cat.className = "silo-category";
        cat.textContent = silo.categoria || "-";

        const drLabel = document.createElement("div");
        const drText = formatDR(silo);
        drLabel.className = "silo-dr" + (drText ? "" : " dr-none");
        drLabel.textContent = drText || "DR: —";

        visual.appendChild(unit);
        visual.appendChild(name);
        visual.appendChild(cat);
        visual.appendChild(drLabel);
        card.appendChild(visual);
        grid.appendChild(card);
      });
    }

    // ── Modal ações ───────────────────────────────────────────────────────────
    function openModal() {
      populateSiloSelect();
      siloSelect.value = getCurrentSilos()[0]?.id || "";
      loadSelectedSilo();
      operadorInput.value = "";
      modalBackdrop.classList.add("show");
    }

    function closeModal() { modalBackdrop.classList.remove("show"); }

    function getSelectedSilo() {
      return getCurrentSilos().find(s => s.id === Number(siloSelect.value));
    }

    function loadSelectedSilo() {
      const silo = getSelectedSilo();
      if (!silo) return;
      nivelInput.value        = silo.nivel;
      umidadeBaixaInput.value = silo.umidadeBaixa;
      tempBaixaInput.value    = silo.tempBaixa;
      umidadeMeioInput.value  = silo.umidadeMeio;
      tempMeioInput.value     = silo.tempMeio;
      umidadeAltaInput.value  = silo.umidadeAlta;
      tempAltaInput.value     = silo.tempAlta;
      tempChamaInput.value    = silo.tempChama || "";
      categoriaInput.value    = silo.categoria || "";
    }

    // ── Validação ─────────────────────────────────────────────────────────────
    function validateField(input, condition) {
      if (condition) {
        input.classList.remove("invalid");
        return true;
      } else {
        input.classList.add("invalid");
        return false;
      }
    }

    async function saveAction() {
      const silo = getSelectedSilo();
      if (!silo) return;

      const operador   = operadorInput.value.trim();
      const nivel      = parseFloat(nivelInput.value);
      const tempChama  = parseFloat(tempChamaInput.value);
      const umBaixa    = parseFloat(umidadeBaixaInput.value);
      const tempBaixa  = parseFloat(tempBaixaInput.value);
      const umMeio     = parseFloat(umidadeMeioInput.value);
      const tempMeio   = parseFloat(tempMeioInput.value);
      const umAlta     = parseFloat(umidadeAltaInput.value);
      const tempAlta   = parseFloat(tempAltaInput.value);
      const categoria  = categoriaInput.value.trim();

      // Validações
      let ok = true;
      ok = validateField(operadorInput,     operador.length > 0)                                  && ok;
      ok = validateField(nivelInput,        !isNaN(nivel)    && nivel    >= 0 && nivel    <= 100) && ok;
      ok = validateField(tempChamaInput,    !isNaN(tempChama)&& tempChama>= 0 && tempChama<= 80) && ok;
      ok = validateField(umidadeBaixaInput, !isNaN(umBaixa)  && umBaixa  >= 0 && umBaixa  <= 40) && ok;
      ok = validateField(umidadeMeioInput,  !isNaN(umMeio)   && umMeio   >= 0 && umMeio   <= 40) && ok;
      ok = validateField(umidadeAltaInput,  !isNaN(umAlta)   && umAlta   >= 0 && umAlta   <= 40) && ok;
      ok = validateField(tempBaixaInput,    !isNaN(tempBaixa))                                    && ok;
      ok = validateField(tempMeioInput,     !isNaN(tempMeio))                                     && ok;
      ok = validateField(tempAltaInput,     !isNaN(tempAlta))   && ok;

      if (!ok) {
        const msgs = [];
        if (!operador)                              msgs.push("Operador(a) é obrigatório.");
        if (isNaN(tempChama) || tempChama > 80)     msgs.push("Temperatura da chama deve ser ≤ 80 °C.");
        if ([umBaixa, umMeio, umAlta].some(v => isNaN(v) || v < 5 || v > 40))
          msgs.push("Umidade deve estar entre 5% e 40%.");
        alert(msgs.length ? msgs.join("\n") : "Preencha todos os campos corretamente.");
        return;
      }

      // Atualiza estado local
      silo.nivel        = Math.max(0, Math.min(100, nivel));
      silo.umidadeBaixa = umBaixa;
      silo.tempBaixa    = tempBaixa;
      silo.umidadeMeio  = umMeio;
      silo.tempMeio     = tempMeio;
      silo.umidadeAlta  = umAlta;
      silo.tempAlta     = tempAlta;
      silo.tempChama    = tempChama;
      silo.categoria    = categoria;

      const timestamp = nowLabel();
      silo.history.push({ timestamp, nivel: silo.nivel, umidadeBaixa: umBaixa, tempBaixa, umidadeMeio: umMeio, tempMeio, umidadeAlta: umAlta, tempAlta, tempChama, categoria });

      renderSilos();
      closeModal();

      // Supabase
      setSyncStatus("syncing", "Salvando…");
      saveBtn.disabled = true;

      try {
        await saveToSupabase({
          timestamp,
          secador:       currentDryer,
          silo_id:       silo.id,
          silo_nome:     silo.nome,
          operador,
          nivel:         silo.nivel,
          umidade_baixa: umBaixa,
          temp_baixa:    tempBaixa,
          umidade_meio:  umMeio,
          temp_meio:     tempMeio,
          umidade_alta:  umAlta,
          temp_alta:     tempAlta,
          temp_chama:    tempChama,
          categoria
        });
        setSyncStatus("ok", "✓ Salvo");
        setTimeout(() => setSyncStatus("", ""), 3500);
      } catch (err) {
        console.error("Supabase error:", err);
        setSyncStatus("error", "⚠ Erro ao salvar");
      } finally {
        saveBtn.disabled = false;
      }
    }

    // ── Chart ─────────────────────────────────────────────────────────────────
    function drawAxes(plotX, plotY, plotW, plotH, labels, minY, maxY) {
      ctx.strokeStyle = "#aaa";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(plotX, plotY);
      ctx.lineTo(plotX, plotY + plotH);
      ctx.lineTo(plotX + plotW, plotY + plotH);
      ctx.stroke();

      ctx.fillStyle = "#555";
      ctx.font = "10px Arial";

      for (let i = 0; i < 5; i++) {
        const value = minY + ((maxY - minY) * (4 - i) / 4);
        const y = plotY + (plotH * i / 4);
        ctx.strokeStyle = "#ececec";
        ctx.beginPath();
        ctx.moveTo(plotX, y);
        ctx.lineTo(plotX + plotW, y);
        ctx.stroke();
        ctx.fillText(formatNumber(value), 4, y + 3);
      }

      labels.forEach((label, index) => {
        const x = labels.length === 1 ? plotX + plotW / 2 : plotX + (plotW * index / (labels.length - 1));
        const d = new Date(label);
        if (!isNaN(d.getTime())) {
          const pad = n => String(n).padStart(2, "0");
          ctx.fillStyle = "#555";
          ctx.fillText(`${pad(d.getHours())}:${pad(d.getMinutes())}`, x - 14, plotY + plotH + 13);
          ctx.fillText(`${pad(d.getDate())}/${pad(d.getMonth()+1)}`,  x - 14, plotY + plotH + 25);
        }
      });
    }

    function drawLine(values, labels, plotX, plotY, plotW, plotH, minY, maxY, color) {
      if (!values.length) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      values.forEach((v, i) => {
        const x = values.length === 1 ? plotX + plotW / 2 : plotX + (plotW * i / (values.length - 1));
        const y = plotY + plotH - ((v - minY) / (maxY - minY || 1)) * plotH;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      values.forEach((v, i) => {
        const x = values.length === 1 ? plotX + plotW / 2 : plotX + (plotW * i / (values.length - 1));
        const y = plotY + plotH - ((v - minY) / (maxY - minY || 1)) * plotH;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawLegend() {
      if (chartMode === "dryingrate") {
        ctx.fillStyle = "#7c3aed";
        ctx.fillRect(20, 10, 10, 10);
        ctx.fillStyle = "#333";
        ctx.font = "11px Arial";
        ctx.fillText("Drying Rate (pph)", 34, 19);
        return;
      }
      [{ label:"Baixa", color:"#ef4444" }, { label:"Meio", color:"#3b82f6" }, { label:"Alta", color:"#22c55e" }]
        .forEach((item, i) => {
          const x = 20 + i * 80;
          ctx.fillStyle = item.color;
          ctx.fillRect(x, 10, 10, 10);
          ctx.fillStyle = "#333";
          ctx.font = "11px Arial";
          ctx.fillText(item.label, x + 14, 19);
        });
    }

    function openChart(siloId) {
      lastOpenedSiloId = siloId;
      const silo = getCurrentSilos().find(s => s.id === siloId);
      if (!silo) return;

      const history = silo.history.length ? silo.history : [{
        timestamp: new Date().toISOString(),
        umidadeBaixa: silo.umidadeBaixa, umidadeMeio: silo.umidadeMeio, umidadeAlta: silo.umidadeAlta,
        tempBaixa: silo.tempBaixa, tempMeio: silo.tempMeio, tempAlta: silo.tempAlta
      }];

      ctx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
      drawLegend();

      const plotX = 38, plotY = 34, plotW = chartCanvas.width - 52, plotH = 155;

      if (chartMode === "dryingrate") {
        // Calcula DR ponto a ponto entre leituras consecutivas válidas (intervalo < 50min)
        const drPoints = [];
        for (let i = 1; i < history.length; i++) {
          const prev = history[i - 1];
          const curr = history[i];
          const dtMin = (new Date(curr.timestamp) - new Date(prev.timestamp)) / 60000;
          if (dtMin > 0 && dtMin < 50) {
            const avgPrev = (Number(prev.umidadeAlta) + Number(prev.umidadeMeio) + Number(prev.umidadeBaixa)) / 3;
            const avgCurr = (Number(curr.umidadeAlta) + Number(curr.umidadeMeio) + Number(curr.umidadeBaixa)) / 3;
            drPoints.push({ timestamp: curr.timestamp, dr: (avgPrev - avgCurr) / (dtMin / 60) });
          }
        }

        if (drPoints.length === 0) {
          ctx.fillStyle = "#888";
          ctx.font = "13px Poppins, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("Sem dados suficientes para Drying Rate", chartCanvas.width / 2, chartCanvas.height / 2);
          ctx.textAlign = "left";
        } else {
          const drValues = drPoints.map(p => p.dr);
          const drLabels = drPoints.map(p => p.timestamp);
          const minY = Math.min(...drValues) - 0.1;
          const maxY = Math.max(...drValues) + 0.1;
          drawAxes(plotX, plotY, plotW, plotH, drLabels, minY, maxY);
          drawLine(drValues, drLabels, plotX, plotY, plotW, plotH, minY, maxY, "#7c3aed");
        }

        chartTitle.textContent    = `${currentDryer} — ${silo.nome}`;
        chartSubtitle.textContent = `Categoria: ${silo.categoria || "-"} · Drying Rate (pph)`;
        historyCount.textContent  = `${history.length} registro${history.length !== 1 ? "s" : ""} no histórico`;

      } else {
        const labels = history.map(h => h.timestamp);
        const baixa  = history.map(h => Number(chartMode === "umidade" ? h.umidadeBaixa : h.tempBaixa));
        const meio   = history.map(h => Number(chartMode === "umidade" ? h.umidadeMeio  : h.tempMeio));
        const alta   = history.map(h => Number(chartMode === "umidade" ? h.umidadeAlta  : h.tempAlta));
        const all    = [...baixa, ...meio, ...alta];
        const minY   = Math.min(...all) - 0.5;
        const maxY   = Math.max(...all) + 0.5;

        drawAxes(plotX, plotY, plotW, plotH, labels, minY, maxY);
        drawLine(baixa, labels, plotX, plotY, plotW, plotH, minY, maxY, "#ef4444");
        drawLine(meio,  labels, plotX, plotY, plotW, plotH, minY, maxY, "#3b82f6");
        drawLine(alta,  labels, plotX, plotY, plotW, plotH, minY, maxY, "#22c55e");

        chartTitle.textContent    = `${currentDryer} — ${silo.nome}`;
        chartSubtitle.textContent = `Categoria: ${silo.categoria || "-"} · ${chartMode === "umidade" ? "Umidade (%)" : "Temperatura (°C)"}`;
        historyCount.textContent  = `${history.length} registro${history.length !== 1 ? "s" : ""} no histórico`;
      }

      chartBackdrop.classList.add("show");
    }

    function closeChart() { chartBackdrop.classList.remove("show"); }
    function changeDryer() { currentDryer = dryerSelect.value; renderSilos(); }

    // ── Events ────────────────────────────────────────────────────────────────
    openModalBtn.addEventListener("click", openModal);
    cancelBtn.addEventListener("click", closeModal);
    saveBtn.addEventListener("click", saveAction);
    siloSelect.addEventListener("change", loadSelectedSilo);
    dryerSelect.addEventListener("change", changeDryer);
    closeChartBtn.addEventListener("click", closeChart);

    modalBackdrop.addEventListener("click", e => { if (e.target === modalBackdrop) closeModal(); });
    chartBackdrop.addEventListener("click",  e => { if (e.target === chartBackdrop) closeChart(); });

    const toggleChartBtn = document.getElementById("toggleChartBtn");

    function updateToggleLabel() {
      if (chartMode === "umidade")      toggleChartBtn.textContent = "Ver Temperatura";
      else if (chartMode === "temperatura") toggleChartBtn.textContent = "Ver Drying Rate";
      else                              toggleChartBtn.textContent = "Ver Umidade";
    }

    toggleChartBtn.addEventListener("click", () => {
      if (chartMode === "umidade")           chartMode = "temperatura";
      else if (chartMode === "temperatura")  chartMode = "dryingrate";
      else                                   chartMode = "umidade";
      updateToggleLabel();
      closeChart();
      setTimeout(() => openChart(lastOpenedSiloId), 50);
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    populateDryerSelect();
    renderSilos();
  </script>
</body>
</html>
